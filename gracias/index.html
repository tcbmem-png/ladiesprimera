<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Ladies Primera Cleaning</title>
  <link rel="icon" type="image/svg+xml" href="/public/logo/ladies-primera-favicon-32.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #F5F0E8;
      --green: #6F8576;
      --gold:  #C8A46B;
      --charcoal: #2E2E2E;
      --serif: 'Playfair Display', Georgia, serif;
      --sans:  'Jost', Helvetica, Arial, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      font-weight: 300;
      background: var(--green);
      color: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .icon { font-size: 56px; margin-bottom: 24px; }
    h1 {
      font-family: var(--serif);
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 500;
      margin-bottom: 12px;
    }
    .subtitle {
      font-size: 18px;
      opacity: 0.8;
      margin-bottom: 6px;
    }
    .subtitle-es {
      font-size: 16px;
      opacity: 0.65;
      margin-bottom: 32px;
    }
    .divider {
      width: 60px;
      height: 2px;
      background: var(--gold);
      margin: 32px auto;
      opacity: 0.6;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: var(--gold);
      color: var(--charcoal);
      font-family: var(--sans);
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 3px;
      transition: background 0.2s;
      margin-bottom: 32px;
    }
    .btn:hover { background: #b89258; }
    .contact {
      font-size: 15px;
      opacity: 0.7;
      line-height: 1.8;
    }
    .contact a { color: var(--gold); }
  </style>
</head>
<body>
  <div class="icon">✅</div>
  <h1>Request Received!</h1>
  <p class="subtitle">We'll be in touch within a few hours to confirm your details.</p>
  <p class="subtitle-es">¡Solicitud recibida! Nos comunicaremos pronto para confirmar los detalles.</p>
  <div class="divider"></div>
  <a href="/" class="btn">Back to Home</a>
  <p class="contact">
    If urgent, text us at <a href="sms:6627151804">662-715-1804</a><br />
    or email <a href="mailto:ladiesprimera901@gmail.com">ladiesprimera901@gmail.com</a>
  </p>
</body>
</html>
